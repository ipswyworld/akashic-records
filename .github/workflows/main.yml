name: Akasha CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Run Backend Tests
        run: |
          cd backend
          # We skip heavy LLM tests in CI
          pytest tests/test_api.py

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-python@v4
        with:
          node-version: '18'
      - name: Install Dependencies
        run: |
          cd frontend-react
          npm install
      - name: Build Frontend
        run: |
          cd frontend-react
          npm run build
