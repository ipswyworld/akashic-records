<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --primary: #bb86fc;
      --secondary: #03dac6;
      --bg: rgba(18, 18, 18, 0.9);
      --surface: rgba(255, 255, 255, 0.05);
      --text: #e0e0e0;
      --error: #cf6679;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #121212;
      color: var(--text);
      overflow-x: hidden;
    }

    .container {
      padding: 20px;
      background: linear-gradient(135deg, rgba(187, 134, 252, 0.05) 0%, rgba(18, 18, 18, 0) 100%);
      min-height: 400px;
    }

    /* Glassmorphism Effect */
    .glass {
      background: var(--surface);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 18px;
      margin: 0;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: var(--secondary);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--secondary);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    button:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-1px);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--primary);
      color: #000;
      border: none;
    }

    .btn-primary:hover:not(:disabled) {
      background: #a370f7;
      box-shadow: 0 4px 15px rgba(187, 134, 252, 0.3);
    }

    .btn-outline {
      border: 1px solid var(--primary);
      color: var(--primary);
      background: transparent;
    }

    .summary-box {
      font-size: 12px;
      line-height: 1.6;
      color: #b0b0b0;
      display: none;
      max-height: 200px;
      overflow-y: auto;
    }

    .summary-box::-webkit-scrollbar {
      width: 4px;
    }

    .summary-box::-webkit-scrollbar-thumb {
      background: var(--surface);
      border-radius: 10px;
    }

    .settings-panel {
      display: none;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 6px;
      font-size: 12px;
    }

    label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      display: block;
      margin-bottom: 5px;
    }

    .msg {
      font-size: 11px;
      text-align: center;
      margin-top: 15px;
      min-height: 15px;
    }

    /* Sub-agent Mode Indicator */
    .agent-badge {
      font-size: 9px;
      background: rgba(3, 218, 198, 0.1);
      color: var(--secondary);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid rgba(3, 218, 198, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>AKASHA</h1>
        <span class="agent-badge">Sub-Agent Active</span>
      </div>
      <div class="status-dot"></div>
    </header>

    <div class="glass actions" id="main-actions">
      <button class="btn-primary" id="clip-page">
        <span>✨</span> Clip to Akashic Records
      </button>
      <button class="btn-outline" id="summarize-page">
        <span>🧠</span> AI Summary (Autonomous)
      </button>
      <button class="btn-outline" id="target-element">
        <span>🎯</span> Visual Element Target
      </button>
      <button id="toggle-settings">
        <span>⚙️</span> Settings
      </button>
    </div>

    <div class="glass summary-box" id="summary-box">
      <strong>Deep Summary:</strong>
      <p id="summary-text"></p>
    </div>

    <div class="glass settings-panel" id="settings-panel">
      <label>Node Endpoint</label>
      <input type="text" id="apiUrl" placeholder="http://localhost:8001">
      
      <label>Vault Identity (User ID)</label>
      <input type="text" id="userId" placeholder="system_user">
      
      <button class="btn-primary" id="save-settings" style="width: 100%;">Apply Changes</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
