<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Akasha: The Sovereign Node</title>
  <style>
    body { width: 350px; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; }
    .header { background-color: #1f1f1f; padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { margin: 0; font-size: 16px; font-weight: 600; color: #bb86fc; display: flex; align-items: center; gap: 8px; }
    .header h1 span { font-size: 20px; }
    .settings-icon { cursor: pointer; font-size: 18px; opacity: 0.7; transition: opacity 0.2s; }
    .settings-icon:hover { opacity: 1; }
    
    .nav-bar { display: flex; background: #1f1f1f; border-bottom: 1px solid #333; }
    .nav-item { flex: 1; text-align: center; padding: 10px; font-size: 12px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; }
    .nav-item.active { color: #bb86fc; border-bottom-color: #bb86fc; background: #252525; }
    
    .container { padding: 0; }
    .view { display: none; padding: 15px; }
    .view.active { display: block; }

    .btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 8px; background-color: #2d2d2d; color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .btn:hover { background-color: #3d3d3d; transform: translateY(-1px); }
    .btn:active { transform: translateY(1px); }
    .btn.primary { background-color: #bb86fc; color: #000; }
    .btn.primary:hover { background-color: #a370f7; }
    
    .status-msg { text-align: center; font-size: 12px; min-height: 18px; margin-top: 10px; font-weight: 500; }
    
    .settings-panel { display: none; background-color: #1f1f1f; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
    .settings-panel input { width: 100%; padding: 8px; margin-bottom: 10px; background-color: #2d2d2d; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }
    
    .summary-box { display: none; background-color: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 12px; margin-top: 15px; font-size: 13px; line-height: 1.5; color: #ccc; max-height: 200px; overflow-y: auto; }
    
    /* Chat Interface */
    .chat-container { display: flex; flex-direction: column; height: 280px; background-color: #1e1e1e; border-radius: 8px; border: 1px solid #333; }
    .chat-history { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .chat-msg { padding: 8px 12px; border-radius: 12px; font-size: 13px; max-width: 85%; }
    .msg-user { background-color: #2d2d2d; align-self: flex-end; border-bottom-right-radius: 2px; }
    .msg-ai { background-color: #38255c; color: #e0e0e0; align-self: flex-start; border-bottom-left-radius: 2px; }
    .chat-input-area { display: flex; padding: 8px; border-top: 1px solid #333; }
    .chat-input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 13px; }
    .chat-send { background: none; border: none; color: #bb86fc; cursor: pointer; font-size: 16px; padding: 0 5px; }

    /* Model Selector & RAG Badges */
    .meta-bar { display: flex; gap: 10px; padding: 0 0 10px 0; background: transparent; align-items: center; justify-content: space-between; }
    .model-select { background: #2d2d2d; color: #bb86fc; border: none; font-size: 11px; padding: 4px 8px; border-radius: 4px; outline: none; }
    .rag-badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; background: #333; color: #888; border: 1px solid #444; }
    .rag-active { background: #1e3a2f; color: #4ade80; border-color: #4ade80; }
    .ghost-mode { font-size: 11px; color: #ff79c6; cursor: pointer; display: flex; align-items: center; gap: 4px; }

    /* Todo Interface */
    .todo-list { list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto; }
    .todo-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: #1a1a1a; border-radius: 8px; margin-bottom: 8px; border: 1px solid #333; font-size: 13px; }
    .todo-item.completed { opacity: 0.5; }
    .todo-item.completed span { text-decoration: line-through; }
    .todo-checkbox { width: 16px; height: 16px; cursor: pointer; }
    .todo-text { flex: 1; }
    .todo-input-area { display: flex; gap: 10px; margin-bottom: 15px; }
    .todo-input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 4px; font-size: 13px; }
    
    .math-tex { color: #4ade80; font-family: 'Courier New', monospace; background: #000; padding: 2px 4px; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>👁️</span> Akasha Node</h1>
    <div style="display: flex; gap: 12px; align-items: center;">
      <span class="ghost-mode" id="focus-toggle" title="Focus Mode (Disable Auto-HUD)" style="color: #4ade80; cursor: pointer; font-size: 11px;">🧘 <span id="focus-status">OFF</span></span>
      <span class="ghost-mode" id="ghost-toggle" title="Inline Ghostwriter">👻 <span id="ghost-status">OFF</span></span>
      <span class="settings-icon" id="toggle-settings">⚙️</span>
    </div>
  </div>

  <div class="nav-bar">
    <div class="nav-item active" id="nav-actions">Actions</div>
    <div class="nav-item" id="nav-todos">Intentions</div>
    <div class="nav-item" id="nav-chat">Chat</div>
  </div>

  <div class="container">
    <div id="settings-panel" class="view" style="padding: 15px;">
      <label style="font-size: 12px; color: #888; margin-bottom: 4px; display: block;">Bridge URL</label>
      <input type="text" id="apiUrl" placeholder="http://localhost:8001">
      <label style="font-size: 12px; color: #888; margin-bottom: 4px; display: block;">Auth Token</label>
      <input type="password" id="userId" placeholder="JWT Token">
      
      <div style="margin-top: 10px; border-top: 1px solid #333; padding-top: 10px;">
        <label style="font-size: 11px; color: #bb86fc;">Active Connectors:</label>
        <div style="display: flex; gap: 10px; margin-top: 5px;">
          <button class="btn" id="sync-notion" style="font-size: 10px; padding: 5px;">Notion</button>
          <button class="btn" id="sync-slack" style="font-size: 10px; padding: 5px;">Slack</button>
        </div>
      </div>
      
      <div style="margin-top: 10px; border-top: 1px solid #333; padding-top: 10px;">
        <label style="font-size: 11px; display: flex; align-items: center; gap: 8px; margin-bottom: 5px;">
          <input type="checkbox" id="pii-shield" checked> PII Redaction Shield
        </label>
        <label style="font-size: 11px; display: flex; align-items: center; gap: 8px;">
          <input type="checkbox" id="zero-data"> Zero-Data Mode (Local Only)
        </label>
      </div>

      <button class="btn primary" id="save-settings" style="margin-top: 15px;">Save & Synchronize</button>
    </div>

    <div id="view-actions" class="view active">
      <div style="margin-bottom: 10px;">
        <input type="text" id="semantic-search" placeholder="Search your Neural Library..." style="width: 100%; padding: 8px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 4px; font-size: 12px; box-sizing: border-box;">
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
        <button class="btn" id="clip-page" style="margin-bottom: 0;">✨ Vault</button>
        <button class="btn" id="summarize-page" style="margin-bottom: 0;">🧠 Synthesize</button>
      </div>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
        <button class="btn" id="fill-form" style="font-size: 12px;">📝 Smart Fill</button>
        <button class="btn" id="monitor-page" style="font-size: 12px;">👁️ Monitor</button>
      </div>

      <button class="btn" id="visual-reason" style="background: #03dac6; color: #000;">📷 Visual Reasoner</button>
      <button class="btn" id="target-element"><span>🎯</span> Target Element</button>

      <div id="ego-mirror" style="background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px; margin-top: 15px; font-size: 12px; display: none;">
        <strong style="color: #03dac6; display: block; margin-bottom: 8px;">Your Digital Ego:</strong>
        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
          <span>Mood: <span id="ego-mood" style="color: #fff;">Neutral</span></span>
          <span>Signal: <span style="color: #4ade80;">Active</span></span>
        </div>
        <div id="ego-traits" style="color: #888; font-style: italic;">
          Syncing cognitive patterns...
        </div>
      </div>

      <div id="summary-box" class="summary-box">
        <strong style="color: #bb86fc; display: block; margin-bottom: 5px;">Synthesis:</strong>
        <span id="summary-text"></span>
      </div>
    </div>

    <div id="view-todos" class="view">
      <div class="todo-input-area">
        <input type="text" id="todo-input" class="todo-input" placeholder="New intention...">
        <button class="btn primary" id="add-todo" style="width: 60px; margin: 0; padding: 8px;">Add</button>
      </div>
      <ul id="todo-list" class="todo-list">
        <!-- Todos injected here -->
      </ul>
    </div>

    <div id="view-chat" class="view">
      <div class="meta-bar">
        <select id="model-select" class="model-select">
          <option value="local">Local (Gemma 2)</option>
          <option value="cloud">Cloud (Gemini)</option>
          <option value="scholar">Scholar (Speculative)</option>
          <option value="peer">Neural Mesh (P2P)</option>
        </select>
        <div id="rag-status" class="rag-badge">Page Context Offline</div>
      </div>

      <div class="chat-container">
        <div class="chat-history" id="chat-history">
          <div class="chat-msg msg-ai">Neural Bridge Active. How may I assist?</div>
        </div>
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="chat-input" placeholder="Ask the Archivist...">
          <button class="chat-send" id="chat-send">➤</button>
        </div>
      </div>
    </div>

    <div id="msg" class="status-msg"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
