services:
  backend:
    build:
      context: ./backend
    ports:
      - "8001:8001"
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=akasha_password
      - DATABASE_URL=postgresql://akasha_user:akasha_password@db/akasha_db
      - REDIS_URL=redis://redis:6379
      - OLLAMA_URL=http://host.docker.internal:11434
      - AKASHA_INSTALL_DEPS=false
    depends_on:
      - db
      - chroma
      - neo4j
      - redis

  frontend:
    build:
      context: ./frontend-react
    ports:
      - "4200:80"
    depends_on:
      - backend

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: akasha_user
      POSTGRES_PASSWORD: akasha_password
      POSTGRES_DB: akasha_db
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data

  chroma:
    image: chromadb/chroma:latest
    ports: ["8000:8000"]
    volumes:
      - chroma_data:/chroma/data

  neo4j:
    image: neo4j:latest
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/akasha_password
    volumes:
      - neo4j_data:/data

  ipfs:
    image: ipfs/go-ipfs:latest
    ports: ["4001:4001", "5001:5001", "8080:8080"]

  minio:
    image: minio/minio:latest
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: akasha_admin
      MINIO_ROOT_PASSWORD: akasha_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  arweave:
    image: textury/arlocal:latest
    ports: ["1984:1984"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  celery_worker:
    build:
      context: ./backend
    command: celery -A celery_worker worker --loglevel=info
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=akasha_password
      - DATABASE_URL=postgresql://akasha_user:akasha_password@db/akasha_db
      - REDIS_URL=redis://redis:6379
      - OLLAMA_URL=http://host.docker.internal:11434
      - AKASHA_INSTALL_DEPS=false
    depends_on:
      - redis
      - db
      - neo4j
      - chroma

  airflow-webserver:
    image: apache/airflow:2.7.1
    environment:
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://akasha_user:akasha_password@db/akasha_db
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    ports:
      - "8080:8080"
    volumes:
      - ./pipelines/dags:/opt/airflow/dags
    command: webserver
    depends_on:
      - db

  airflow-scheduler:
    image: apache/airflow:2.7.1
    environment:
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://akasha_user:akasha_password@db/akasha_db
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./pipelines/dags:/opt/airflow/dags
    command: scheduler
    depends_on:
      - db

  airflow-init:
    image: apache/airflow:2.7.1
    environment:
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://akasha_user:akasha_password@db/akasha_db
    command: version
    depends_on:
      - db

volumes:
  postgres_data:
  chroma_data:
  neo4j_data:
  minio_data:
